<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veritas | Login</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="auth-page">
  <div class="page-shell">
    <main class="main-content">
      <div class="auth-centered">
        <section class="form-card auth-panel" aria-labelledby="login-heading">
          <a class="auth-brand" th:href="@{/}" aria-label="Veritas home">
            <span class="logo-mark" aria-hidden="true">V</span>
            <span class="logo-word">
              <span class="logo-name">Veritas</span>
              <span class="logo-tag">Banking</span>
            </span>
          </a>
          <div class="section-heading">
            <span class="eyebrow">Secure access</span>
            <h2 id="login-heading">Login</h2>
          </div>
          <form class="form" th:action="@{/login}" th:method="post">
            <div class="form-group">
              <label for="login-username">Username</label>
              <input id="login-username" name="username" type="username" placeholder="Enter your username" required>
            </div>
            <div class="form-group">
              <label for="login-password">Password</label>
              <input id="login-password" name="password" type="password" placeholder="Enter your password" required>
            </div>
            <button class="button button-primary" type="submit">Login</button>
          </form>
          <div class="helper-links">
            <span>New to Veritas?</span>
            <a th:href="@{/register}">Create an account</a>
          </div>
        </section>
      </div>
    </main>

    <footer class="footer">
      <div class="container footer-inner">
        <p>&copy; Veritas Banking App</p>
      </div>
    </footer>
  </div>
</body>
</html>
