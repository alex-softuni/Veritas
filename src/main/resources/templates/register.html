<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veritas | Register</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="auth-page">
  <div class="page-shell">
    <main class="main-content">
      <div class="auth-centered">
        <section class="form-card auth-panel" aria-labelledby="register-heading">
          <a class="auth-brand" href="index.html" aria-label="Veritas home">
            <span class="logo-mark" aria-hidden="true">V</span>
            <span class="logo-word">
              <span class="logo-name">Veritas</span>
              <span class="logo-tag">Banking</span>
            </span>
          </a>
          <div class="section-heading">
            <span class="eyebrow">Open your account</span>
            <h2 id="register-heading">Register</h2>
          </div>
          <form class="form" action="#" method="post">
            <div class="form-group">
              <label for="register-username">Username</label>
              <input id="register-username" name="username" type="text" placeholder="Your username" required>
            </div>
            <div class="form-group">
              <label for="register-email">Email</label>
              <input id="register-email" name="email" type="email" placeholder="name@example.com" required>
            </div>
            <div class="form-group">
              <label for="register-password">Password</label>
              <input id="register-password" name="password" type="password" placeholder="Choose a password" required>
            </div>
            <button class="button button-primary" type="submit">Create account</button>
          </form>
          <div class="helper-links">
            <span>Already have an account?</span>
            <a href="login.html">Go to login</a>
          </div>
        </section>
      </div>
    </main>

    <footer class="footer">
      <div class="container footer-inner">
        <p>&copy; Veritas Banking App</p>
      </div>
    </footer>
  </div>
</body>
</html>
